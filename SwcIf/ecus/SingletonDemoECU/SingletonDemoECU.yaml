name: SingletonDemoECU
swcs:
  - { name: LAMPDRV, yaml: swcs/LAMPDRV/LAMPDRV.yaml }
  - { name: FILTER, yaml: swcs/FILTER/FILTER.yaml }
  - { name: SENSORBRIDGE, yaml: swcs/SENSORBRIDGE/SENSORBRIDGE.yaml }
engine:
  mainfunction_period_ms: 10
  integration_headers: [SingletonDemoECU_DefaultCfg.h]
  enable_input_raw_api: false
  enable_output_raw_api: false
  enable_config_raw_api: false
  enable_input_ovr_api: false
  enable_output_ovr_api: false
  enable_instance_info_api: true
  enable_input_info_api: true
  enable_output_info_api: true
  enable_config_info_api: true
instances:
  - name: LAMPDRV_0
    component: LAMPDRV
  - name: FILTER
    component: FILTER
    default_config_ptr: "&SingletonDemoECU_FILTER_DefaultCfg"
    client_bindings:
      Pwm_SetDutyCycle[0]: SingletonDemoECU_Pwm_SetDutyCycle_A
      Pwm_SetDutyCycle[1]: SingletonDemoECU_Pwm_SetDutyCycle_B
      Reset: SingletonDemoECU_Reset
  - name: SENSORBRIDGE
    component: SENSORBRIDGE
schedules:
  default: NORMAL
  items:
    - name: NORMAL
      period_ms: 20
      switch_mode: deferred
      expiry_points:
        - { offset_ms: 0, run: [LAMPDRV_0, FILTER, SENSORBRIDGE] }
        - { offset_ms: 10, run: [FILTER, SENSORBRIDGE] }
